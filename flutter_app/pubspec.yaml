name: sentinel_iot
description: Ooredoo Sentinel IoT — Datacenter Monitoring Mobile
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & realtime
  http: ^1.2.1
  socket_io_client: ^2.0.3+1

  # State
  provider: ^6.1.2

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.68.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Date/time
  intl: ^0.19.0

  # Export / file sharing
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  cross_file: ^0.3.4+2
  universal_html: ^2.2.4

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/ooredoo-icon.jpeg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ooredoo-icon.jpeg"